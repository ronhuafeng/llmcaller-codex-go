name: Bug report
description: Report a reproducible problem in llmcaller-codex-go.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include a minimal Go snippet, fake ThreadClient test, or real app-server notes when needed.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Go version, module versions, OS, and whether a real Codex app-server was involved.
    validations:
      required: true
