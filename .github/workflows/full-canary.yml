name: Full three-layer canary

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  full-canary:
    name: Full canary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify released modules and all invariant groups
        env:
          LLMCALLER_FULL_CANARY: "1"
        run: |
          go mod verify
          GOWORK=off go test ./llmcaller/codex -run '^TestThreeLayerCanary' -count=1 -v
